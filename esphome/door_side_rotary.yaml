# VelaDial door-side rotary controller
# Hardware: ELECROW CrowPanel 1.28 in ESP32-S3 rotary touch display
# This is a bring-up configuration: display, touch, encoder, backlight, and safe secrets.

substitutions:
  device_name: veladial-door-rotary
  friendly_name: VelaDial Door Rotary
  light_group: light.bedroom_group

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  platformio_options:
    build_flags: "-DBOARD_HAS_PSRAM"
    board_build.esp-idf.memory_type: qio_opi
    board_build.flash_mode: dio
  on_boot:
    priority: 800
    then:
      - logger.log: "VelaDial boot: backlight on"
      - light.turn_on:
          id: back_light
          brightness: 100%
      - output.turn_off: power_light
      - output.turn_on: out1
      - output.turn_on: out2
      - script.execute: screen_idle_timer

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf
    version: recommended

logger:
  level: DEBUG

api:
  encryption:
    key: !secret encryption_key

ota:
  - platform: esphome
    password: !secret ota_key

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Setup"
    password: !secret fallback_ap_password

captive_portal:

psram:
  mode: octal
  speed: 80MHz

output:
  - platform: ledc
    pin: GPIO46
    id: gpio_backlight_pwm

  - platform: gpio
    id: power_light
    pin: GPIO40

  - platform: gpio
    id: out4
    pin: GPIO4
  - platform: gpio
    id: out12
    pin: GPIO12
  - platform: gpio
    id: out1
    pin: GPIO1
  - platform: gpio
    id: out2
    pin: GPIO2

light:
  - platform: monochromatic
    name: "Backlight"
    output: gpio_backlight_pwm
    id: back_light
    restore_mode: ALWAYS_ON

sensor:
  - platform: rotary_encoder
    id: knob
    name: "Encoder"
    pin_a:
      number: GPIO45
      mode:
        input: true
        pullup: true
    pin_b:
      number: GPIO42
      mode:
        input: true
        pullup: true
    resolution: 1
    min_value: -100000
    max_value: 100000
    on_value:
      then:
        - script.execute: wake_screen

binary_sensor:
  - platform: touchscreen
    id: touch_anywhere
    name: "Touch Wake"
    x_min: 0
    y_min: 0
    x_max: 240
    y_max: 240
    on_press:
      - script.execute: wake_screen

  - platform: gpio
    pin:
      number: GPIO41
      mode:
        input: true
        pullup: true
      inverted: true
    id: rotary_button
    name: "Rotary Button"
    on_press:
      - script.execute: wake_screen
      - homeassistant.action:
          action: light.toggle
          data:
            entity_id: ${light_group}

i2c:
  - id: i2c_touch
    setup_priority: 400
    sda: GPIO6
    scl: GPIO7
    scan: true
    frequency: 400kHz

touchscreen:
  platform: cst816
  id: touch
  address: 0x15
  interrupt_pin: GPIO5
  reset_pin: GPIO13
  i2c_id: i2c_touch
  transform:
    mirror_x: false
    mirror_y: true
    swap_xy: true

spi:
  id: spi_bus
  mosi_pin: GPIO11
  clk_pin: GPIO10

font:
  - file: "gfonts://Roboto"
    id: roboto16
    size: 16
  - file: "gfonts://Roboto"
    id: roboto32
    size: 32

display:
  - platform: ili9xxx
    id: round_display
    model: GC9A01A
    cs_pin: GPIO9
    dc_pin: GPIO3
    reset_pin: GPIO14
    invert_colors: true
    rotation: 0

lvgl:
  displays:
    - round_display
  default_font: roboto16
  disp_bg_color: black
  touchscreens:
    touchscreen_id: touch
  pages:
    - id: power_page
      widgets:
        - label:
            id: title_label
            align: CENTER
            y: -20
            text: "VelaDial"
        - label:
            id: state_label
            align: CENTER
            y: 22
            text: "Press dial"

script:
  - id: wake_screen
    mode: restart
    then:
      - light.turn_on:
          id: back_light
          brightness: 100%
      - script.execute: screen_idle_timer

  - id: screen_idle_timer
    mode: restart
    then:
      - delay: 60s
      - light.turn_on:
          id: back_light
          brightness: 10%

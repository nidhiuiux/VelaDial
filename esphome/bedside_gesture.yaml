# VelaDial bedside gesture controller
# Hardware: ESP32-C6 + APDS-9960 gesture/proximity sensor
# Purpose: silent local control of the bedroom light group through Home Assistant

substitutions:
  device_name: bedside-gesture-controller
  friendly_name: Bedside Gesture Controller
  light_group: light.bedroom_group

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret encryption_key

ota:
  - platform: esphome
    password: !secret ota_key

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Setup"
    password: !secret fallback_ap_password

captive_portal:

i2c:
  sda: SDA
  scl: SCL
  scan: true

apds9960:
  address: 0x39
  update_interval: 60s

binary_sensor:
  - platform: apds9960
    direction: LEFT
    name: "Gesture Left - Lights Off"
    id: gesture_left_off
    on_press:
      - homeassistant.action:
          action: light.turn_off
          data:
            entity_id: ${light_group}

  - platform: apds9960
    direction: RIGHT
    name: "Gesture Right - Lights On"
    id: gesture_right_on
    on_press:
      - homeassistant.action:
          action: light.turn_on
          data:
            entity_id: ${light_group}

sensor:
  - platform: apds9960
    type: PROXIMITY
    name: "Proximity Sensor"
    id: proximity_sensor
    on_value_range:
      - above: 200
        then:
          - homeassistant.action:
              action: light.turn_on
              data:
                entity_id: ${light_group}
                brightness_pct: "10"
          - delay: 2s
